name: shopito_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.8.1
  flutter_bloc: ^9.1.0
  dio: ^5.8.0+1
  get_it: ^8.0.3
  url_launcher: ^6.3.1
  equatable: ^2.0.7
  cached_network_image: ^3.3.1
  shared_preferences: ^2.5.3
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  bloc: ^9.0.0
  connectivity_plus: ^6.1.3
  flutter_secure_storage: ^9.2.4
  logging: ^1.3.0
  either_dart: ^1.0.0
  stream_transform: ^2.1.0
  safe_device: ^1.2.1
  flutter_widget_from_html: ^0.16.1
  video_player: ^2.10.0
  fleather: ^1.14.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.6
  flutter_flavorizr: ^2.2.1

  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

flavorizr:
  ide: "vscode"
  app:
    android:
      flavorDimensions: "flavor-type"

  flavors:
    dev:
      app:
        name: "Shopito Dev"

      android:
        applicationId: "com.example.shopito_app.dev"

      ios:
        bundleId: "com.example.shopito_app.dev"

    prod:
      app:
        name: "Shopito"

      android:
        applicationId: "com.example.shopito_app"

      ios:
        bundleId: "com.example.shopito_app"
